<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Live Builder - Real-time Collaboration</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rpg: {
                            black: 'var(--bg-color, #0B0C10)',
                            cyan: 'var(--primary-color, #66FCF1)',
                            slate: 'var(--accent-color, #1F2833)',
                            silver: 'var(--text-color, #C5C6C7)',
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // Inicialização imediata no head
        if (window.FIREBASE_CONFIG) {
            firebase.initializeApp(window.FIREBASE_CONFIG);
        }
    </script>
</head>
<body class="bg-rpg-black text-rpg-silver overflow-x-hidden">

    <!-- LOADING OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 z-[200] bg-rpg-black flex items-center justify-center transition-opacity duration-500">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-rpg-cyan border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-rpg-cyan font-bold tracking-widest uppercase">Conectando ao Vazio...</p>
        </div>
    </div>

    <!-- EDITOR SIDEBAR -->
    <div id="editor-sidebar" class="fixed top-0 right-0 w-80 h-full bg-rpg-slate/95 backdrop-blur-md z-[100] transform translate-x-full transition-transform duration-300 border-l border-rpg-cyan/30 p-6 flex flex-col gap-6 shadow-2xl">
        <div class="flex items-center justify-between">
            <h2 class="text-xl font-bold text-rpg-cyan">Live Builder</h2>
            <button id="close-editor" class="text-rpg-silver hover:text-white">✕</button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Cor do Tema</label>
                <input type="color" id="primary-color-picker" class="w-full h-10 rounded bg-transparent border border-rpg-cyan/30 cursor-pointer">
            </div>
            
            <div class="pt-4 border-t border-rpg-cyan/10">
                <h3 class="text-sm font-bold uppercase tracking-wider text-rpg-cyan/50 mb-3">Adicionar Módulo</h3>
                <div class="flex flex-col gap-2 p-2">
                    <button onclick="Actions.addModule('hero')" class="p-2 hover:bg-white/10 rounded flex items-center gap-2 text-sm text-rpg-silver"><span>🖼️</span> Hero</button>
                    <button onclick="Actions.addModule('text')" class="p-2 hover:bg-white/10 rounded flex items-center gap-2 text-sm text-rpg-silver"><span>📝</span> Texto</button>
                    <button onclick="Actions.addModule('cards')" class="p-2 hover:bg-white/10 rounded flex items-center gap-2 text-sm text-rpg-silver"><span>🎴</span> Cards</button>
                    <button onclick="Actions.addModule('gallery')" class="p-2 hover:bg-white/10 rounded flex items-center gap-2 text-sm text-rpg-silver"><span>📷</span> Galeria</button>
                    <button onclick="Actions.addModule('characters')" class="p-2 hover:bg-white/10 rounded flex items-center gap-2 text-sm text-rpg-silver"><span>🎭</span> Personagens</button>
                    <button onclick="Actions.addModule('cta')" class="p-2 hover:bg-white/10 rounded flex items-center gap-2 text-sm text-rpg-silver"><span>🔗</span> Botão/Link</button>
                    <button onclick="Actions.addModule('footer')" class="p-2 hover:bg-white/10 rounded flex items-center gap-2 text-sm text-rpg-silver border-t border-white/10 mt-2"><span>🏁</span> Rodapé</button>
                </div>
            </div>

            <div class="pt-4 border-t border-rpg-cyan/10">
                <div class="flex items-center gap-2 text-[10px] text-rpg-cyan/50 uppercase font-bold mb-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    Sincronização Ativa
                </div>
                <p class="text-[10px] text-gray-500 italic">As mudanças são salvas instantaneamente para todos os visitantes.</p>
            </div>
        </div>
    </div>

    <!-- FLOAT BUTTON -->
    <button id="toggle-editor" onclick="Actions.toggleEdit()" class="fixed bottom-8 right-8 z-[101] bg-rpg-cyan text-rpg-black p-4 rounded-full shadow-lg shadow-cyan-500/50 hover:scale-110 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
    </button>

    <!-- MAIN MODULE CONTAINER -->
    <div id="modulesContainer">
        <!-- Modules will be rendered here -->
    </div>

    <!-- Global Image Input -->
    <input type="file" id="imageInput" accept="image/*" class="hidden">

    <script type="module" src="src/main.js"></script>
</body>
</html>
